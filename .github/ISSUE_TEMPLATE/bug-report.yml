name: Bug report
description: Report a bug in Claw or one of the bundled skills.
title: "[Bug] "
labels:
  - bug
body:
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which part of the repository is affected?
      options:
        - Claw CLI
        - bilibili-notes
        - md2notion
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Briefly describe the issue.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide a clear reproduction path.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python / Node version, and any relevant context.
      placeholder: Windows 11, Python 3.11, Node 20 ...
